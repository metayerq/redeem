<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Estudantina</title>
<style>
  :root {
    --bg: #f6f1e3;
    --surface: #fffdf6;
    --green: #1c5e3c;
    --green-dark: #154a2f;
    --ink: #232a24;
    --muted: #7c7a6c;
    --border: #e2dbc6;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px;
  }
  .wordmark { font-size: .8rem; font-weight: 700; letter-spacing: .35em; color: var(--green); margin-bottom: 26px; }
  .card { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 30px 26px; }
  h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 18px; }
  h2 { font-size: .75rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 26px 0 10px; }
  input#pin { width: 100%; padding: 14px; font-size: 1.1rem; border: 1px solid var(--border); border-radius: 8px; letter-spacing: 6px; text-align: center; background: var(--surface); }
  input#search { width: 100%; padding: 11px 14px; font-size: .9rem; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; background: var(--surface); }
  input:focus { outline: none; border-color: var(--green); }
  button { width: 100%; margin-top: 16px; padding: 14px; font-size: .95rem; font-weight: 600; color: var(--bg); background: var(--green); border: none; border-radius: 8px; cursor: pointer; }
  button:active { background: var(--green-dark); }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 18px 0 4px; }
  .stat { border: 1px solid var(--border); border-radius: 8px; padding: 14px 6px; text-align: center; }
  .stat b { display: block; font-size: 1.6rem; font-weight: 600; color: var(--green); }
  .stat span { font-size: .7rem; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; }
  .hidden { display: none; }
  a { color: var(--green); font-size: .8rem; display: block; text-align: center; margin-top: 18px; }
  .err { color: #8c2f24; font-size: .85rem; margin-top: 10px; text-align: center; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  th, td { padding: 9px 10px; text-align: left; white-space: nowrap; }
  th { background: var(--bg); color: var(--muted); font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; position: sticky; top: 0; }
  tr:not(:last-child) td { border-bottom: 1px solid #efe9d8; }
  td code { font-family: ui-monospace, Menlo, monospace; color: var(--green-dark); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .7rem; font-weight: 600; }
  .badge.ok   { background: #e9f1e4; color: var(--green); }
  .badge.no   { background: #efe9d8; color: var(--muted); }
  .badge.used { background: #f3e2dd; color: #8c2f24; }
  .empty { text-align: center; color: var(--muted); padding: 24px; font-size: .9rem; }
  .count { font-weight: 400; color: var(--muted); }
</style>
</head>
<body>
<div class="wordmark">ESTUDANTINA</div>
<div class="card">
  <section id="login">
    <h1>PIN admin</h1>
    <input type="password" id="pin" inputmode="numeric">
    <button id="login-btn">Entrer</button>
    <p class="err" id="err"></p>
  </section>

  <section id="panel" class="hidden">
    <h1>Suivi</h1>
    <div class="stats">
      <div class="stat"><b id="s-issued">–</b><span>bons émis</span></div>
      <div class="stat"><b id="s-redeemed">–</b><span>utilisés</span></div>
      <div class="stat"><b id="s-optins">–</b><span>opt-in news</span></div>
    </div>

    <h2>Contacts <span class="count" id="count"></span></h2>
    <input type="search" id="search" placeholder="Rechercher — email, prénom, téléphone, code">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Email</th><th>Prénom</th><th>Téléphone</th><th>News</th><th>Code</th><th>Bon</th><th>Inscrit le</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty hidden" id="empty">Aucun contact pour l'instant.</div>
    </div>

    <button id="export-btn">Exporter en CSV</button>
    <a href="/staff">Retour à la validation des bons</a>
  </section>
</div>
<script>
const $ = (id) => document.getElementById(id);
let pin = sessionStorage.getItem('gb-pin') || '';
let contacts = [];

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const fmtDate = (iso) => new Date(iso).toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

function render() {
  const q = $('search').value.trim().toLowerCase();
  const list = q
    ? contacts.filter((c) => [c.email, c.first_name, c.phone, c.code].join(' ').toLowerCase().includes(q))
    : contacts;
  $('rows').innerHTML = list.map((c) => `
    <tr>
      <td>${esc(c.email)}</td>
      <td>${esc(c.first_name) || '–'}</td>
      <td>${esc(c.phone) || '–'}</td>
      <td><span class="badge ${c.marketing_opt_in ? 'ok' : 'no'}">${c.marketing_opt_in ? 'oui' : 'non'}</span></td>
      <td><code>${esc(c.code)}</code></td>
      <td><span class="badge ${c.redeemed_at ? 'used' : 'ok'}">${c.redeemed_at ? 'utilisé' : 'à servir'}</span></td>
      <td>${fmtDate(c.created_at)}</td>
    </tr>`).join('');
  $('empty').classList.toggle('hidden', list.length > 0);
  $('count').textContent = q ? `(${list.length} / ${contacts.length})` : `(${contacts.length})`;
}

async function loadStats() {
  const r = await fetch('/api/stats', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pin }),
  });
  if (!r.ok) { $('err').textContent = 'PIN incorrect'; sessionStorage.removeItem('gb-pin'); return false; }
  const s = await r.json();
  $('s-issued').textContent = s.issued;
  $('s-redeemed').textContent = s.redeemed;
  $('s-optins').textContent = s.optIns;
  contacts = s.contacts || [];
  render();
  $('login').classList.add('hidden');
  $('panel').classList.remove('hidden');
  return true;
}
if (pin) loadStats();

$('login-btn').addEventListener('click', async () => {
  pin = $('pin').value;
  if (await loadStats()) sessionStorage.setItem('gb-pin', pin);
});
$('pin').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('login-btn').click(); });
$('search').addEventListener('input', render);

$('export-btn').addEventListener('click', async () => {
  const r = await fetch('/api/export', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pin }),
  });
  const blob = await r.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'contacts-estudantina.csv';
  a.click();
});
</script>
</body>
</html>
